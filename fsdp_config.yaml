compute_environment: LOCAL_MACHINE
distributed_type: FSDP
debug: false
machine_rank: 0
num_machines: 1
num_processes: 2
mixed_precision: bf16
rdzv_backend: static
same_network: true
main_training_function: main
downcast_bf16: 'no'
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false

fsdp_config:
  fsdp_version: 2
  fsdp_reshard_after_forward: true          # FSDP2 equivalent of FULL_SHARD
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_transformer_layer_cls_to_wrap: Qwen3VLTextDecoderLayer,Qwen3VLVisionBlock
  fsdp_use_orig_params: true
  fsdp_cpu_ram_efficient_loading: true      # load shards lazily; lower host RAM spike
  fsdp_offload_params: false                # set true ONLY if you still OOM (slow)
  fsdp_state_dict_type: FULL_STATE_DICT     # rank0 gathers full weights (save + vLLM sync)
  fsdp_sync_module_states: true